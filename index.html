<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Cup Markets</title>
    <link rel="stylesheet" href="base.css?v=3" />
    <link rel="stylesheet" href="layout.css?v=6" />
    <link rel="stylesheet" href="components.css?v=9" />
    <link rel="stylesheet" href="markets.css?v=9" />
    <link rel="stylesheet" href="responsive.css?v=5" />
    <style>
      .skeleton-card { display: flex; flex-direction: column; gap: 12px; padding: 20px; background: #1e293b; border-radius: 12px; }
      .skeleton-shape { background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); background-size: 200% 100%; animation: skeleton-pulse 1.4s ease infinite; border-radius: 6px; }
      .shape-line { height: 14px; }
      .shape-circle { width: 40px; height: 40px; border-radius: 50%; }
      .shape-badge { height: 36px; border-radius: 8px; flex: 1; }
      .skeleton-row { display: flex; gap: 8px; }
      .w-40 { width: 40%; }
      .w-60 { width: 60%; }
      .w-80 { width: 80%; }
      @keyframes skeleton-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      #error-screen {
        position: fixed; inset: 0; z-index: 9998;
        display: flex; align-items: center; justify-content: center;
        background: #0b1120; color: #e2e8f0; font-family: system-ui, sans-serif;
      }
      #error-screen[hidden] { display: none; }
      .error-content { text-align: center; max-width: 400px; padding: 24px; }
      .error-content strong { display: block; font-size: 22px; margin-bottom: 12px; }
      .error-content p { color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
      .error-content button {
        padding: 10px 28px; border: 0; border-radius: 8px;
        background: #3b82f6; color: #fff; font-size: 15px; cursor: pointer;
      }
      .error-content button:hover { background: #2563eb; }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <script type="module" src="/runtime-config.js?v=1"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
